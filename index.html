// ===== AUDIO =====
let audioCtx;
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)}catch(e){}}
function sfx(freq,dur,type,vol){
  if(!audioCtx||!game.soundOn)return;
  try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type||'square';o.frequency.value=freq;
  g.gain.setValueAtTime(vol||.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}
}

function explode(x,y,color,n){n=n||12;for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),s=rand(1,5);addPart(x,y,Math.cos(a)*s,Math.sin(a)*s,color,rand(.3,.8),rand(2,5))}sfx(100,.3,'sawtooth',.08)}

// ===== DRAW =====
function drawUnit(u){
  const t=Date.now()*.001,hover=Math.sin(t*3+u.id*2)*2;
  ctx.save();ctx.translate(u.x,u.y+hover);
  if(u.isEnemy)ctx.scale(-1,1);
  ctx.shadowBlur=8;ctx.shadowColor=u.color;ctx.fillStyle=u.color;ctx.strokeStyle=u.color;ctx.lineWidth=2;
  if(u.state==='ATTACK')ctx.globalAlpha=.6+Math.sin(t*15)*.4;
  if(u.state==='DIE'){ctx.globalAlpha=.3;ctx.scale(.8,.8)}
  const fn=SHAPES[u.shape];if(fn)fn(ctx,u.size,t);
  ctx.shadowBlur=0;ctx.restore();
  if(u.hp<u.maxHp&&u.state!=='DIE'){const bw=30*u.size;drawBar(u.x-bw/2,u.y-28*u.size+hover,bw,3,u.hp,u.maxHp,u.color)}
}
function drawBar(x,y,w,h,val,max,color){
  ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(x,y,w,h);
  ctx.fillStyle=color;ctx.fillRect(x,y,w*clamp(val/max,0,1),h);
}
function drawText(txt,x,y,color,sz,align){ctx.fillStyle=color||'#fff';ctx.font=(sz||16)+'px sans-serif';ctx.textAlign=align||'center';ctx.textBaseline='middle';ctx.fillText(txt,x,y)}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function drawBtn(x,y,w,h,txt,bg,fg,on){
  ctx.globalAlpha=on!==false?1:.35;ctx.fillStyle=bg||'#222';ctx.strokeStyle=fg||'#0ff';ctx.lineWidth=2;
  if(on!==false){ctx.shadowBlur=6;ctx.shadowColor=fg||'#0ff'}
  roundRect(x,y,w,h,6);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle=fg||'#0ff';ctx.font=Math.min(h*.4,16)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(txt,x+w/2,y+h/2);ctx.globalAlpha=1;return{x,y,w,h}
}
function inBtn(b,px,py){return b&&px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h}

// ===== TAB ICONS =====
function drawTabIcon(type,x,y,sz,color){
  ctx.save();ctx.translate(x,y);ctx.fillStyle=color;ctx.strokeStyle=color;ctx.lineWidth=1.5;const s=sz;
  switch(type){
    case'battle':
      ctx.beginPath();ctx.moveTo(-s*.4,-s*.5);ctx.lineTo(s*.1,0);ctx.lineTo(-s*.4,s*.5);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(s*.4,s*.5);ctx.lineTo(-s*.1,0);ctx.lineTo(s*.4,-s*.5);ctx.closePath();ctx.fill();break;
    case'cards':
      ctx.fillRect(-s*.3,-s*.4,s*.45,s*.7);ctx.strokeRect(-s*.3,-s*.4,s*.45,s*.7);
      ctx.globalAlpha=.5;ctx.fillRect(-s*.1,-s*.5,s*.45,s*.7);ctx.globalAlpha=1;ctx.strokeRect(-s*.1,-s*.5,s*.45,s*.7);break;
    case'hero':
      ctx.beginPath();ctx.arc(0,-s*.25,s*.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo(-s*.25,0);ctx.lineTo(-s*.35,s*.5);ctx.lineTo(s*.35,s*.5);ctx.lineTo(s*.25,0);ctx.closePath();ctx.fill();break;
    case'dungeon':
      ctx.beginPath();ctx.arc(0,0,s*.4,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(0,0,s*.2,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(0,0,s*.08,0,Math.PI*2);ctx.fill();break;
    case'shop':
      ctx.beginPath();ctx.moveTo(0,-s*.5);ctx.lineTo(s*.4,0);ctx.lineTo(0,s*.5);ctx.lineTo(-s*.4,0);ctx.closePath();ctx.fill();
      ctx.fillStyle='#000';ctx.globalAlpha=.3;ctx.beginPath();ctx.moveTo(0,-s*.2);ctx.lineTo(s*.15,0);ctx.lineTo(0,s*.2);ctx.lineTo(-s*.15,0);ctx.closePath();ctx.fill();ctx.globalAlpha=1;break;
  }
  ctx.restore();
}

// ===== BATTLE LOGIC =====
function mkUnit(def,isEnemy,x){
  const gy=H*.65,by=def.isAir?gy-60:gy-15;
  const es=isEnemy?enemyScale():1,ts=isEnemy?timelineScale():1;
  return{id:uid++,x,y:by-(def.size||1)*10+rand(-3,3),isEnemy,
    shape:def.shape||def.id,name:def.name,
    hp:Math.floor(def.hp*es*ts*(isEnemy?1:game.cardHpMult)),
    maxHp:Math.floor(def.hp*es*ts*(isEnemy?1:game.cardHpMult)),
    dmg:Math.floor(def.dmg*es*ts*(isEnemy?1:game.cardAtkMult)),
    spd:def.spd,range:def.range,atkSpd:def.atkSpd,color:def.color,
    size:def.size||1,isAir:def.isAir||false,state:'MOVE',atkT:0,dieT:0}
}
function spawnUnit(i){
  if(i>=UNIT_TYPES.length)return;const t=UNIT_TYPES[i];
  if(t.unlock>game.planetLv||game.food<t.cost||game.unitCD[i]>0||game.pUnits.length>=30||game.battleState!=='FIGHTING')return;
  game.food-=t.cost;game.unitCD[i]=t.cd;
  game.pUnits.push(mkUnit(t,false,W*.13));sfx(800,.08,'square',.1);
}
function spawnEnemy(){
  const pl=curPlanetTheme();
  const avail=pl.enemies.filter((_,i)=>i===0||i===1&&game.bTime>8||i===2&&game.bTime>20);
  let tw=0;for(const e of avail)tw+=e.w;
  let r=rand(0,tw),sel=avail[0];
  for(const e of avail){r-=e.w;if(r<=0){sel=e;break}}
  if(game.eUnits.length<30)game.eUnits.push(mkUnit(sel,true,W*.87));
}

function startPlanet(){
  game.battleState='FIGHTING';game.bTime=0;game.espTimer=2;
  game.eBaseMax=enemyBaseHP();game.eBaseHP=game.eBaseMax;
  game.pBaseMax=500;game.pBaseHP=game.pBaseMax;
  // don't clear player units on evolution - they persist
}

function evolve(){
  if(game.coins<evoCost()||game.battleState!=='CLEARED')return;
  game.coins-=evoCost();
  game.planetLv++;
  if(game.planetLv>game.highestPlanet)game.highestPlanet=game.planetLv;
  game.eUnits=[];game.projs=[];
  startPlanet();
  sfx(523,.15,'sine',.15);setTimeout(()=>sfx(784,.2,'sine',.15),150);
  saveGame();
}

function timelineReset(){
  game.gems+=game.resetReward;
  game.timeline++;game.planetLv=1;game.coins=0;game.food=0;
  game.pUnits=[];game.eUnits=[];game.projs=[];game.parts=[];
  game.unitCD=[0,0,0,0,0];game.totalKills=0;
  game.showReset=false;
  startPlanet();
  saveGame();
}

function updateBattle(dt){
  const spd=game.gameSpeed;
  const sdt=dt*spd;
  if(game.battleState!=='FIGHTING')return;
  game.bTime+=sdt;
  // food
  game.food=Math.min(game.maxFood,game.food+game.foodRate*game.cardFoodMult*sdt);
  // cooldowns
  for(let i=0;i<5;i++)if(game.unitCD[i]>0)game.unitCD[i]=Math.max(0,game.unitCD[i]-sdt);
  // enemy spawn
  const si=Math.max(.8,2.5-game.bTime*.01);
  game.espTimer-=sdt;if(game.espTimer<=0){spawnEnemy();game.espTimer=si}
  // units
  updUnits(game.pUnits,game.eUnits,1,sdt);
  updUnits(game.eUnits,game.pUnits,-1,sdt);
  // base attacks
  const ebx=W*.88,pbx=W*.12;
  for(const u of game.pUnits){
    if(u.state==='DIE')continue;
    if(u.x>=ebx-u.range&&!hasTarget(u,game.eUnits)){
      u.state='ATTACK';u.atkT-=sdt;
      if(u.atkT<=0){game.eBaseHP-=u.dmg;u.atkT=1/u.atkSpd;addProj(u.x,u.y,ebx,H*.65-40,u.color);game.shake=3;sfx(300,.1,'sawtooth',.06)}
    }
  }
  for(const u of game.eUnits){
    if(u.state==='DIE')continue;
    if(u.x<=pbx+u.range&&!hasTarget(u,game.pUnits)){
      u.state='ATTACK';u.atkT-=sdt;
      if(u.atkT<=0){game.pBaseHP-=u.dmg;u.atkT=1/u.atkSpd;addProj(u.x,u.y,pbx,H*.65-40,u.color);game.shake=4;sfx(150,.15,'sawtooth',.08)}
    }
  }
  // projectiles
  for(const p of game.projs){p.life-=sdt;const pr=1-p.life/p.ml;p.cx=lerp(p.x,p.tx,pr);p.cy=lerp(p.y,p.ty,pr)}
  game.projs=game.projs.filter(p=>p.life>0);
  // particles
  for(const p of game.parts){p.x+=p.vx*60*sdt;p.y+=p.vy*60*sdt;p.life-=sdt}
  game.parts=game.parts.filter(p=>p.life>0);
  // shake
  if(game.shake>0){game.shake*=.9;if(game.shake<.3)game.shake=0}
  // cleanup
  game.pUnits=game.pUnits.filter(u=>u.state!=='DEAD');
  game.eUnits=game.eUnits.filter(u=>u.state!=='DEAD');
  // win
  if(game.eBaseHP<=0){
    game.battleState='CLEARED';game.eUnits=[];
    sfx(523,.15,'sine',.15);setTimeout(()=>sfx(659,.15,'sine',.15),150);setTimeout(()=>sfx(784,.3,'sine',.15),300);
    saveGame();
  }
  // lose
  if(game.pBaseHP<=0){
    game.battleState='DEFEATED';game.pUnits=[];game.eUnits=[];
    game.resetReward=resetGems();game.showReset=true;
    sfx(200,.3,'sawtooth',.1);
  }
}
function hasTarget(u,enemies){for(const e of enemies)if(e.state!=='DIE'&&Math.abs(u.x-e.x)<=u.range)return true;return false}
function updUnits(units,enemies,dir,dt){
  for(const u of units){
    if(u.state==='DIE'){u.dieT-=dt;if(u.dieT<=0)u.state='DEAD';continue}
    let nearest=null,nd=Infinity;
    for(const e of enemies){if(e.state==='DIE')continue;const d=Math.abs(u.x-e.x);if(d<nd){nd=d;nearest=e}}
    if(nearest&&nd<=u.range){
      u.state='ATTACK';u.atkT-=dt;
      if(u.atkT<=0){
        nearest.hp-=u.dmg;u.atkT=1/u.atkSpd;
        if(u.range>50)addProj(u.x,u.y,nearest.x,nearest.y,u.color);
        else addPart((u.x+nearest.x)/2,(u.y+nearest.y)/2,rand(-1,1),rand(-1,1),'#fff',.15,4);
        sfx(400+rand(-50,50),.05,'square',.04);
        if(nearest.hp<=0){nearest.state='DIE';nearest.dieT=.3;explode(nearest.x,nearest.y,nearest.color,10);
          if(nearest.isEnemy!==undefined){game.coins+=Math.floor(5+game.planetLv*2);game.totalKills++}}
      }
    }else{
      u.state='MOVE';u.x+=u.spd*dir*60*dt;u.atkT=0;
      if(Math.random()<.15)addPart(u.x-dir*10,u.y,rand(-dir*.5,-dir*.2),rand(-.3,.3),u.color,.2,rand(1,2));
    }
  }
}

const HUD_H=.06,TAB_H=.13,CARD_H=.15;

function renderGame(){
  const pl=curPlanetTheme();
  // battle tab = show battlefield
  if(game.tab===0){
    ctx.save();
    if(game.shake>0)ctx.translate(rand(-game.shake,game.shake),rand(-game.shake,game.shake));
    drawBg(pl);drawPBase();drawEBase();
    const all=[...game.pUnits,...game.eUnits].sort((a,b)=>a.y-b.y);
    for(const u of all)if(u.state!=='DEAD')drawUnit(u);
    for(const p of game.projs){ctx.save();ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.shadowBlur=6;ctx.shadowColor=p.color;ctx.globalAlpha=p.life/p.ml;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.cx,p.cy);ctx.stroke();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.cx,p.cy,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.restore()}
    for(const p of game.parts){ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(p.life/p.ml),0,Math.PI*2);ctx.fill()}
    ctx.globalAlpha=1;ctx.restore();
    // cleared overlay
    if(game.battleState==='CLEARED'){
      ctx.fillStyle='rgba(0,255,136,.08)';ctx.fillRect(0,H*.1,W,H*.5);
      ctx.save();ctx.shadowBlur=20;ctx.shadowColor='#0f8';ctx.fillStyle='#0f8';
      ctx.font='bold '+Math.min(W*.06,36)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('클리어!',W/2,H*.35);ctx.shadowBlur=0;ctx.restore();
    }
    // unit cards + evo button
    renderUnitCards();
  }else{
    // non-battle tabs: draw space bg
    drawBg(null);
    const cy=H*HUD_H,ch=H*(1-HUD_H-TAB_H);
    switch(game.tab){
      case 1:renderPlaceholder(cy,ch,'카드','카드 뽑기 / 영구 강화 시스템','#fa0','준비 중');break;

// --- UNIT CARDS ---
function renderUnitCards(){
  const cardY=H*BF_BOT,cardH=H*CARD_H;
  ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,cardY,W,cardH);
  const uc=UNIT_TYPES.length;
  const cw=Math.min((W*.78)/uc-6,100),gap=6;
  const tw=uc*(cw+gap)-gap,sx=15,cy=cardY+4;
  const ch=cardH-8;
  game._btns.units=[];
  for(let i=0;i<uc;i++){
    const t=UNIT_TYPES[i],bx=sx+i*(cw+gap);
    const unlocked=t.unlock<=game.planetLv;
    const canAfford=game.food>=t.cost&&game.unitCD[i]<=0;
    const ok=unlocked&&canAfford&&game.battleState==='FIGHTING';
    ctx.globalAlpha=unlocked?(ok?1:.5):.25;
    ctx.fillStyle=ok?'#0a1515':'#080808';ctx.strokeStyle=ok?t.color:(unlocked?'#333':'#1a1a1a');ctx.lineWidth=ok?2:1;
    if(ok){ctx.shadowBlur=4;ctx.shadowColor=t.color}
    roundRect(bx,cy,cw,ch,5);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    if(unlocked){
      // mini preview
      ctx.save();ctx.translate(bx+cw/2,cy+ch*.28);ctx.fillStyle=t.color;ctx.strokeStyle=t.color;ctx.lineWidth=1;
      const fn=SHAPES[t.shape];if(fn)fn(ctx,.3,Date.now()*.001);ctx.restore();
      drawText(t.name,bx+cw/2,cy+ch*.55,t.color,Math.min(cw*.1,9));
      drawText('🍖'+t.cost,bx+cw/2,cy+ch*.75,ok?'#fc0':'#666',Math.min(cw*.11,10));
      // cooldown overlay
      if(game.unitCD[i]>0){
        const cdRatio=game.unitCD[i]/t.cd;
        ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(bx,cy+ch*(1-cdRatio),cw,ch*cdRatio);
        drawText(game.unitCD[i].toFixed(1)+'s',bx+cw/2,cy+ch/2,'#fff',11);
      }
    }else{
      drawText('🔒',bx+cw/2,cy+ch*.35,'#555',16);
      drawText('Lv.'+t.unlock,bx+cw/2,cy+ch*.65,'#555',9);
    }
    ctx.globalAlpha=1;
    if(ok)game._btns.units.push({x:bx,y:cy,w:cw,h:ch,i});
  }
  // Evolution button (right side)
  const evoX=sx+uc*(cw+gap)+10,evoW=Math.min(W-evoX-15,120);
  if(game.battleState==='CLEARED'){
    const canEvo=game.coins>=evoCost();
    const t2=Date.now()*.001,pulse=canEvo?1+Math.sin(t2*4)*.06:1;
    ctx.save();ctx.translate(evoX+evoW/2,cy+ch/2);ctx.scale(pulse,pulse);ctx.translate(-(evoX+evoW/2),-(cy+ch/2));
    game._btns.evo=drawBtn(evoX,cy,evoW,ch*.6,'⬆ 진화','#0a2a0a','#0f8',canEvo);
    ctx.restore();
    drawText('💰'+evoCost(),evoX+evoW/2,cy+ch*.8,canEvo?'#fc0':'#666',10);
  }else{
    // give up button
    game._btns.giveup=drawBtn(evoX,cy+ch*.5,evoW,ch*.4,'포기/리셋','#1a0808','#f44');
    // show current evo cost
    drawText('진화 💰'+evoCost(),evoX+evoW/2,cy+ch*.25,'#555',9);
  }
}

function tapGame(x,y){
  // reset popup
  if(game.showReset){
    if(inBtn(game._btns.reset,x,y))timelineReset();
    return;
  }
  // tabs
  if(game._btns.tabs)for(const b of game._btns.tabs)if(inBtn(b,x,y)){
    if(game.tab!==b.i){game.tab=b.i;sfx(800,.04,'sine',.08)}return;

  if(inBtn(game._btns.speed,x,y)){
    game.gameSpeed=game.gameSpeed>=3?1:game.gameSpeed+1;sfx(600,.04,'sine',.08);return;
  }
  // battle tab specifics
  if(game.tab===0){
    if(game._btns.units)for(const b of game._btns.units)if(inBtn(b,x,y)){spawnUnit(b.i);return}
    if(inBtn(game._btns.evo,x,y)){evolve();return}
    if(inBtn(game._btns.giveup,x,y)){game.resetReward=resetGems();game.showReset=true;return}
  }
}

// ===== SAVE/LOAD =====
function saveGame(){try{localStorage.setItem('starConquest2',JSON.stringify({
  g:game.gems,tl:game.timeline,hp:game.highestPlanet,
  ca:game.cardAtkMult,ch2:game.cardHpMult,cf:game.cardFoodMult,
  snd:game.soundOn
}))}catch(e){}}
function loadGame(){try{const d=JSON.parse(localStorage.getItem('starConquest2'));if(d){
  game.gems=d.g||0;game.timeline=d.tl||1;game.highestPlanet=d.hp||1;
  game.cardAtkMult=d.ca||1;game.cardHpMult=d.ch2||1;game.cardFoodMult=d.cf||1;
  if(d.snd!==undefined)game.soundOn=d.snd;
}}catch(e){}}

// ===== INPUT =====
function getPos(e){
  const r=canvas.getBoundingClientRect(),sx=canvas.width/r.width,sy=canvas.height/r.height;
  const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-r.left)*sx,y:(cy-r.top)*sy}
}
function onTap(e){
  e.preventDefault();initAudio();const p=getPos(e);
  if(game.screen==='MENU')tapMenu(p.x,p.y);
  else tapGame(p.x,p.y);
}
canvas.addEventListener('touchstart',onTap,{passive:false});
canvas.addEventListener('mousedown',onTap);

// ===== MAIN LOOP =====
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  if(game.screen==='GAME'&&game.tab===0&&!game.showReset)updateBattle(dt);
  if(game.screen==='MENU')renderMenu();
  else renderGame();
  requestAnimationFrame(loop);
}

// ===== INIT =====
resize();loadGame();requestAnimationFrame(loop);
</script>
</body>
