let audioCtx;
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)}catch(e){}}
function sfx(freq,dur,type,vol){
  if(!audioCtx||!game.soundOn)return;
  try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type||'square';o.frequency.value=freq;
  g.gain.setValueAtTime(vol||.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}
}

function fmtNum(n){return n>=10000?(n/1000).toFixed(1)+'k':n>=1000?(n/1000).toFixed(1)+'k':Math.floor(n)}
const rand=(a,b)=>Math.random()*(b-a)+a;
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

function curPlanetTheme(){return PLANET_THEMES[(game.planetLv-1)%PLANET_THEMES.length]}
function enemyScale(){return 1+(game.planetLv-1)*.35}
function timelineScale(){return Math.pow(2,game.timeline-1)}
function enemyBaseHP(){return Math.floor(200*Math.pow(1.4,game.planetLv-1)*timelineScale())}
function evoCost(){return Math.floor(50*Math.pow(1.4,game.planetLv-1))}
function resetGems(){return Math.floor(10+game.planetLv*5+game.totalKills*.1)}

function recalcStats(){
  let am=1,hm=1,fm=1,bm=1;
  for(let i=0;i<CARD_DEFS.length;i++){const c=CARD_DEFS[i],n=game.cardInv[i];
    if(c.type==='atk')am+=n*c.val;else if(c.type==='hp')hm+=n*c.val;else if(c.type==='food')fm+=n*c.val}
  for(let i=0;i<SKILL_DEFS.length;i++){const s=SKILL_DEFS[i],lv=game.skillLv[i];if(lv>0){
    if(s.stat==='atk')am+=s.perLv*lv;else if(s.stat==='hp')hm+=s.perLv*lv;
    else if(s.stat==='food')fm+=s.perLv*lv;else if(s.stat==='baseHp')bm+=s.perLv*lv}}
  for(let i=0;i<3;i++){const rid=game.runeEquipped[i];if(rid!=null){const r=RUNE_DEFS[rid];
    if(r.stat==='atk')am+=r.val;else if(r.stat==='hp')hm+=r.val;else if(r.stat==='food')fm+=r.val;
    else if(r.stat==='all'){am+=r.val;hm+=r.val;fm+=r.val;bm+=r.val}}}
  for(let i=0;i<3;i++){if(game.upgUnits[i]&&game.upgUnitLv[i]>0){const st=getTierStats(game.upgTier,i);
    am+=st.atkPer*game.upgUnitLv[i];hm+=st.hpPer*game.upgUnitLv[i]}}
  game.cardAtkMult=am;game.cardHpMult=hm;game.cardFoodMult=fm;game.baseHpMult=bm;
  game.maxFood=100+game.shopBought[0]*50;
  game.foodRate=5+game.shopBought[2]*2+game.upgFood*2;
}
function pullCards(count,guaranteeEpic){
  const results=[];
  for(let i=0;i<count;i++){let rarity;
    if(guaranteeEpic&&i===0){rarity=Math.random()<.2?3:2}
    else{const r=Math.random();rarity=r<.03?3:r<.15?2:r<.4?1:0}
    const pool=CARD_DEFS.filter(c=>c.rarity===rarity);
    const card=pool[Math.floor(Math.random()*pool.length)];
    game.cardInv[card.id]++;results.push(card)}
  recalcStats();saveGame();return results;
}
function skillCost(i){return Math.floor(SKILL_DEFS[i].baseCost*Math.pow(1.3,game.skillLv[i]))}
function upgUnitLvCost(i){return Math.floor((80+game.upgTier*20)*Math.pow(1.3,game.upgUnitLv[i]-1))}
function upgFoodCost(){return Math.floor((50+game.upgTier*10)*Math.pow(1.25,game.upgFood))}
function upgBaseCost(){return Math.floor((100+game.upgTier*20)*Math.pow(1.35,game.upgBase))}
function shopCost(i){const s=SHOP_DEFS[i];return i<=2?Math.floor(s.baseCost*Math.pow(1.3,game.shopBought[i])):s.baseCost}
function dungeonReward(id){
  const scale=1+game.planetLv*.3+(game.timeline-1)*.5;
  if(id===0)return{coins:Math.floor(100*scale),gems:0,card:-1,rune:-1};
  if(id===1)return{coins:Math.floor(30*scale),gems:Math.floor(5+scale*2),card:-1,rune:-1};
  const r=Math.random();let rr=r<.05?3:r<.2?2:r<.6?1:0;
  const pool=CARD_DEFS.filter(c=>c.rarity===rr);
  const card=pool[Math.floor(Math.random()*pool.length)];
  let rune=-1;
  if(Math.random()<.4){const rr2=Math.random();let rRar=rr2<.05?3:rr2<.2?2:rr2<.5?1:0;
    const rPool=RUNE_DEFS.filter(r=>r.rarity===rRar);rune=rPool[Math.floor(Math.random()*rPool.length)].id}
  return{coins:Math.floor(80*scale),gems:Math.floor(3+scale),card:card.id,rune};
}
function formatTime(s){const m=Math.floor(s/60),ss=s%60;return m>0?m+'분 '+ss+'초':ss+'초'}
function updateDungeon(dt){
  if(game.dungeonActive<0)return;const d=DUNGEON_DEFS[game.dungeonActive];
  game.dungeonTimer+=dt;
  if(game.dungeonTimer>=d.dur){
    const reward=dungeonReward(game.dungeonActive);
    game.coins+=reward.coins;game.gems+=reward.gems;
    if(reward.card>=0)game.cardInv[reward.card]++;
    if(reward.rune>=0)game.runeInv[reward.rune]++;
    game.dungeonCD[game.dungeonActive]=Date.now()+d.cd*1000;
    game.dungeonResult={...reward,type:game.dungeonActive};
    game.dungeonActive=-1;game.dungeonTimer=0;
    recalcStats();saveGame();
    sfx(523,.15,'sine',.15);setTimeout(()=>sfx(784,.2,'sine',.15),150);
  }
}

// ===== DRAW =====
function drawUnit(u){
  const t=Date.now()*.001,hover=Math.sin(t*3+u.id*2)*2;
  ctx.save();ctx.translate(u.x,u.y+hover);
  if(u.isEnemy)ctx.scale(-1,1);
  ctx.shadowBlur=8;ctx.shadowColor=u.color;ctx.fillStyle=u.color;ctx.strokeStyle=u.color;ctx.lineWidth=2;
  if(u.state==='ATTACK')ctx.globalAlpha=.6+Math.sin(t*15)*.4;
  if(u.state==='DIE'){ctx.globalAlpha=.3;ctx.scale(.8,.8)}
  const fn=SHAPES[u.shape];if(fn)fn(ctx,u.size,t);
  ctx.shadowBlur=0;ctx.restore();
  if(u.hp<u.maxHp&&u.state!=='DIE'){const bw=30*u.size;drawBar(u.x-bw/2,u.y-28*u.size+hover,bw,3,u.hp,u.maxHp,u.color)}
}
function drawBar(x,y,w,h,val,max,color){
  ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(x,y,w,h);
  ctx.fillStyle=color;ctx.fillRect(x,y,w*clamp(val/max,0,1),h);
}
function drawText(txt,x,y,color,sz,align){ctx.fillStyle=color||'#fff';ctx.font=(sz||16)+'px sans-serif';ctx.textAlign=align||'center';ctx.textBaseline='middle';ctx.fillText(txt,x,y)}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function drawBtn(x,y,w,h,txt,bg,fg,on){
  ctx.globalAlpha=on!==false?1:.35;ctx.fillStyle=bg||'#222';ctx.strokeStyle=fg||'#0ff';ctx.lineWidth=2;
  if(on!==false){ctx.shadowBlur=6;ctx.shadowColor=fg||'#0ff'}
  roundRect(x,y,w,h,6);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle=fg||'#0ff';ctx.font=Math.min(h*.4,16)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(txt,x+w/2,y+h/2);ctx.globalAlpha=1;return{x,y,w,h}
}
function inBtn(b,px,py){return b&&px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h}

// ===== TAB ICONS =====
function drawTabIcon(type,x,y,sz,color){
  ctx.save();ctx.translate(x,y);ctx.fillStyle=color;ctx.strokeStyle=color;ctx.lineWidth=1.5;const s=sz;
  switch(type){
    case'battle':
      ctx.beginPath();ctx.moveTo(-s*.4,-s*.5);ctx.lineTo(s*.1,0);ctx.lineTo(-s*.4,s*.5);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(s*.4,s*.5);ctx.lineTo(-s*.1,0);ctx.lineTo(s*.4,-s*.5);ctx.closePath();ctx.fill();break;
    case'cards':
      ctx.fillRect(-s*.3,-s*.4,s*.45,s*.7);ctx.strokeRect(-s*.3,-s*.4,s*.45,s*.7);
      ctx.globalAlpha=.5;ctx.fillRect(-s*.1,-s*.5,s*.45,s*.7);ctx.globalAlpha=1;ctx.strokeRect(-s*.1,-s*.5,s*.45,s*.7);break;
    case'upgrade':
      ctx.beginPath();ctx.moveTo(0,-s*.5);ctx.lineTo(s*.35,-s*.1);ctx.lineTo(s*.15,-s*.1);ctx.lineTo(s*.15,s*.4);ctx.lineTo(-s*.15,s*.4);ctx.lineTo(-s*.15,-s*.1);ctx.lineTo(-s*.35,-s*.1);ctx.closePath();ctx.fill();break;
    case'dungeon':
      ctx.beginPath();ctx.arc(0,0,s*.4,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(0,0,s*.2,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(0,0,s*.08,0,Math.PI*2);ctx.fill();break;
    case'shop':
      ctx.beginPath();ctx.moveTo(0,-s*.5);ctx.lineTo(s*.4,0);ctx.lineTo(0,s*.5);ctx.lineTo(-s*.4,0);ctx.closePath();ctx.fill();
      ctx.fillStyle='#000';ctx.globalAlpha=.3;ctx.beginPath();ctx.moveTo(0,-s*.2);ctx.lineTo(s*.15,0);ctx.lineTo(0,s*.2);ctx.lineTo(-s*.15,0);ctx.closePath();ctx.fill();ctx.globalAlpha=1;break;
  }
  ctx.restore();
}

// ===== BASES =====
function drawPBase(){
  const x=W*.1,gy=GY,sz=Math.min(W*.09,40);
  ctx.save();ctx.shadowBlur=15;ctx.shadowColor='#0ff';ctx.fillStyle='#006688';ctx.strokeStyle='#0ff';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x-sz,gy-4);ctx.lineTo(x-sz*.65,gy-sz*1.6);ctx.lineTo(x+sz*.65,gy-sz*1.6);ctx.lineTo(x+sz,gy-4);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#00aacc';ctx.beginPath();ctx.arc(x,gy-sz*1.6,sz*.45,Math.PI,0);ctx.fill();ctx.stroke();
  ctx.fillStyle='#0ff';ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(x,gy-sz,sz*.2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  ctx.shadowBlur=0;ctx.restore();
  const bw=sz*2.2;
  drawBar(x-bw/2,gy-sz*2.1,bw,8,game.pBaseHP,game.pBaseMax,'#0fc');
  drawText(fmtNum(game.pBaseHP),x,gy-sz*2.1-12,'#0fc',11);
}
function drawEBase(){
  const pl=curPlanetTheme(),x=W*.9,gy=GY,col=pl.surface,sz=Math.min(W*.09,40);
  ctx.save();ctx.shadowBlur=15;ctx.shadowColor=col;ctx.fillStyle=col;ctx.lineWidth=2;ctx.globalAlpha=.7;
  ctx.beginPath();ctx.moveTo(x-sz*.8,gy-4);ctx.lineTo(x-sz*.5,gy-sz*1.8);ctx.lineTo(x,gy-sz*2.1);ctx.lineTo(x+sz*.5,gy-sz*1.8);ctx.lineTo(x+sz*.8,gy-4);ctx.closePath();ctx.fill();
  ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,gy-sz*1.2,sz*.18+Math.sin(Date.now()*.003)*2,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.restore();
  const bw=sz*2.2;
  drawBar(x-bw/2,gy-sz*2.6,bw,8,game.eBaseHP,game.eBaseMax,col);
  drawText(fmtNum(game.eBaseHP),x,gy-sz*2.6-12,col,11);
}

// ===== BACKGROUND =====
function drawBg(pl){
  const grad=ctx.createLinearGradient(0,0,0,GY);
  grad.addColorStop(0,pl?pl.bgTop:'#050510');grad.addColorStop(1,pl?pl.bgBot:'#0a0a20');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,GY);
  const t=Date.now()*.001;
  for(const s of game.stars){ctx.fillStyle=`rgba(255,255,255,${s.br*(.5+.5*Math.sin(t*s.tw))})`;ctx.beginPath();ctx.arc(s.x,s.y,s.sz,0,Math.PI*2);ctx.fill();s.x-=s.sp*game.gameSpeed;if(s.x<0)s.x=W}
  if(pl){
    const gg=ctx.createLinearGradient(0,GY,0,H);gg.addColorStop(0,pl.ground);gg.addColorStop(1,'#000');
    ctx.fillStyle=gg;ctx.fillRect(0,GY,W,H-GY);
    ctx.strokeStyle=pl.surface;ctx.lineWidth=2;ctx.globalAlpha=.4;ctx.shadowBlur=4;ctx.shadowColor=pl.surface;
    ctx.beginPath();ctx.moveTo(0,GY);ctx.lineTo(W,GY);ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
}

// ===== BATTLE LOGIC =====
function mkUnit(def,isEnemy,x){
  const gy=GY,by=def.isAir?gy-60:gy-15;
  const es=isEnemy?enemyScale():1,ts=isEnemy?timelineScale():1;
  return{id:uid++,x,y:by-(def.size||1)*10+rand(-3,3),isEnemy,
    shape:def.shape||def.id,name:def.name,
    hp:Math.floor(def.hp*es*ts*(isEnemy?1:game.cardHpMult)),
    maxHp:Math.floor(def.hp*es*ts*(isEnemy?1:game.cardHpMult)),
    dmg:Math.floor(def.dmg*es*ts*(isEnemy?1:game.cardAtkMult)),
    spd:def.spd,range:def.range,atkSpd:def.atkSpd,color:def.color,
    size:def.size||1,isAir:def.isAir||false,state:'MOVE',atkT:0,dieT:0}
}
function spawnUnit(i){
  if(i>=UNIT_TYPES.length)return;const t=UNIT_TYPES[i];
  if(t.unlock>game.planetLv||game.food<t.cost||game.unitCD[i]>0||game.pUnits.length>=30||game.battleState!=='FIGHTING')return;
  game.food-=t.cost;game.unitCD[i]=t.cd;
  game.pUnits.push(mkUnit(t,false,W*.15));sfx(800,.08,'square',.1);
}
function spawnEnemy(){
  const pl=curPlanetTheme();
  const avail=pl.enemies.filter((_,i)=>i===0||i===1&&game.bTime>8||i===2&&game.bTime>20);
  let tw=0;for(const e of avail)tw+=e.w;
  let r=rand(0,tw),sel=avail[0];
  for(const e of avail){r-=e.w;if(r<=0){sel=e;break}}
  if(game.eUnits.length<30)game.eUnits.push(mkUnit(sel,true,W*.85));
}

function startPlanet(){
  game.battleState='FIGHTING';game.bTime=0;game.espTimer=2;
  game.eBaseMax=enemyBaseHP();game.eBaseHP=game.eBaseMax;
  let baseHP=500+game.shopBought[1]*100+game.upgBase*50;
  baseHP=Math.floor(baseHP*game.baseHpMult);
  game.pBaseMax=baseHP;game.pBaseHP=game.pBaseMax;
  recalcStats();
}

function evolve(){
  if(game.coins<evoCost()||game.battleState!=='CLEARED')return;
  game.coins-=evoCost();
  game.planetLv++;
  if(game.planetLv>game.highestPlanet)game.highestPlanet=game.planetLv;
  game.eUnits=[];game.projs=[];
  startPlanet();
  sfx(523,.15,'sine',.15);setTimeout(()=>sfx(784,.2,'sine',.15),150);
  saveGame();
}

function timelineReset(){
  game.gems+=game.resetReward;
  game.timeline++;game.planetLv=1;game.coins=0;game.food=0;
  game.pUnits=[];game.eUnits=[];game.projs=[];game.parts=[];
  game.unitCD=[0,0,0,0,0];game.totalKills=0;
  game.showReset=false;
  game.screen='HOME';
  saveGame();
}

function updateBattle(dt){
  const spd=game.gameSpeed;
  const sdt=dt*spd;
  if(game.battleState!=='FIGHTING')return;
  game.bTime+=sdt;
  // food
  game.food=Math.min(game.maxFood,game.food+game.foodRate*game.cardFoodMult*sdt);
  // cooldowns
  for(let i=0;i<5;i++)if(game.unitCD[i]>0)game.unitCD[i]=Math.max(0,game.unitCD[i]-sdt);
  // enemy spawn
  const si=Math.max(.8,2.5-game.bTime*.01);
  game.espTimer-=sdt;if(game.espTimer<=0){spawnEnemy();game.espTimer=si}
  // units
  updUnits(game.pUnits,game.eUnits,1,sdt);
  updUnits(game.eUnits,game.pUnits,-1,sdt);
  // base attacks
  const ebx=W*.9,pbx=W*.1;
  for(const u of game.pUnits){
    if(u.state==='DIE')continue;
    if(u.x>=ebx-u.range&&!hasTarget(u,game.eUnits)){
      u.state='ATTACK';u.atkT-=sdt;
      if(u.atkT<=0){game.eBaseHP-=u.dmg;u.atkT=1/u.atkSpd;addProj(u.x,u.y,ebx,GY-40,u.color);game.shake=3;sfx(300,.1,'sawtooth',.06)}
    }
  }
  for(const u of game.eUnits){
    if(u.state==='DIE')continue;
    if(u.x<=pbx+u.range&&!hasTarget(u,game.pUnits)){
      u.state='ATTACK';u.atkT-=sdt;
      if(u.atkT<=0){game.pBaseHP-=u.dmg;u.atkT=1/u.atkSpd;addProj(u.x,u.y,pbx,GY-40,u.color);game.shake=4;sfx(150,.15,'sawtooth',.08)}
    }
  }
  // projectiles
  for(const p of game.projs){p.life-=sdt;const pr=1-p.life/p.ml;p.cx=lerp(p.x,p.tx,pr);p.cy=lerp(p.y,p.ty,pr)}
  game.projs=game.projs.filter(p=>p.life>0);
  // particles
  for(const p of game.parts){p.x+=p.vx*60*sdt;p.y+=p.vy*60*sdt;p.life-=sdt}
  game.parts=game.parts.filter(p=>p.life>0);
  // shake
  if(game.shake>0){game.shake*=.9;if(game.shake<.3)game.shake=0}
  // cleanup
  game.pUnits=game.pUnits.filter(u=>u.state!=='DEAD');
  game.eUnits=game.eUnits.filter(u=>u.state!=='DEAD');
  // win
  if(game.eBaseHP<=0){
    game.battleState='CLEARED';game.eUnits=[];
    sfx(523,.15,'sine',.15);setTimeout(()=>sfx(659,.15,'sine',.15),150);setTimeout(()=>sfx(784,.3,'sine',.15),300);
    saveGame();
  }
  // lose
  if(game.pBaseHP<=0){
    game.battleState='DEFEATED';game.pUnits=[];game.eUnits=[];
    game.resetReward=resetGems();game.showReset=true;
    sfx(200,.3,'sawtooth',.1);
  }
}
function hasTarget(u,enemies){for(const e of enemies)if(e.state!=='DIE'&&Math.abs(u.x-e.x)<=u.range)return true;return false}
function updUnits(units,enemies,dir,dt){
  for(const u of units){
    if(u.state==='DIE'){u.dieT-=dt;if(u.dieT<=0)u.state='DEAD';continue}
    let nearest=null,nd=Infinity;
    for(const e of enemies){if(e.state==='DIE')continue;const d=Math.abs(u.x-e.x);if(d<nd){nd=d;nearest=e}}
    if(nearest&&nd<=u.range){
      u.state='ATTACK';u.atkT-=dt;
      if(u.atkT<=0){
        nearest.hp-=u.dmg;u.atkT=1/u.atkSpd;
        if(u.range>50)addProj(u.x,u.y,nearest.x,nearest.y,u.color);
        else addPart((u.x+nearest.x)/2,(u.y+nearest.y)/2,rand(-1,1),rand(-1,1),'#fff',.15,4);
        sfx(400+rand(-50,50),.05,'square',.04);
        if(nearest.hp<=0){nearest.state='DIE';nearest.dieT=.3;explode(nearest.x,nearest.y,nearest.color,10);
          if(nearest.isEnemy!==undefined){game.coins+=Math.floor(5+game.planetLv*2);game.totalKills++}}
      }
    }else{
      u.state='MOVE';u.x+=u.spd*dir*60*dt;u.atkT=0;
      if(Math.random()<.15)addPart(u.x-dir*10,u.y,rand(-dir*.5,-dir*.2),rand(-.3,.3),u.color,.2,rand(1,2));
    }
  }
}

function drawTierShip(type,tier,x,y,sz){
  ctx.save();ctx.translate(x,y);
  const s=sz*(1+tier*.008),col=getTierColor(tier,type),d=Math.floor(tier/5),sub=tier%5;
  ctx.fillStyle=col;ctx.strokeStyle=col;
  if(tier>=15){ctx.shadowBlur=3+d*2;ctx.shadowColor=col}
  if(type===0){// MELEE — 날카로운 돌격선
    const w=s*(.24+d*.04);
    ctx.beginPath();ctx.moveTo(0,-s*(.65+d*.06));
    ctx.lineTo(w*.7,-s*.15);ctx.lineTo(w,s*.12);
    if(d>=1){ctx.lineTo(w+s*(.1+d*.025),s*(.02+sub*.008));ctx.lineTo(w,s*.2)}
    ctx.lineTo(w*.55,s*.32);ctx.lineTo(0,s*(.26+d*.02));
    ctx.lineTo(-w*.55,s*.32);
    if(d>=1){ctx.lineTo(-w,s*.2);ctx.lineTo(-w-s*(.1+d*.025),s*(.02+sub*.008))}
    ctx.lineTo(-w,s*.12);ctx.lineTo(-w*.7,-s*.15);ctx.closePath();ctx.fill();
    if(d>=3){ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,-s*(.65+d*.06));ctx.lineTo(0,-s*(.8+d*.06));ctx.stroke();
      ctx.beginPath();ctx.moveTo(w*.4,-s*.22);ctx.lineTo(w+s*.1,-s*.32);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-w*.4,-s*.22);ctx.lineTo(-w-s*.1,-s*.32);ctx.stroke()}
    if(d>=5){ctx.globalAlpha=.2;ctx.fillStyle='#fff';
      ctx.beginPath();ctx.moveTo(0,-s*(.65+d*.06));ctx.lineTo(s*.04,-s*.3);ctx.lineTo(-s*.04,-s*.3);ctx.closePath();ctx.fill();ctx.globalAlpha=1}
  }else if(type===1){// RANGED — 긴 포신의 포격선
    const bw=s*(.17+d*.03);
    ctx.fillRect(-s*.025,-s*(.72+d*.05),s*.05,s*(.38+d*.03));
    if(d>=3){ctx.fillRect(bw-s*.012,-s*.22,s*.024,s*.14);ctx.fillRect(-bw-s*.012,-s*.22,s*.024,s*.14)}
    if(d>=5){ctx.fillRect(-s*.015,-s*(.82+d*.05),s*.03,s*.1)}
    ctx.beginPath();ctx.moveTo(0,-s*(.34+d*.02));ctx.lineTo(bw,s*.04);
    ctx.lineTo(bw+s*(.14+d*.03),s*(.13+sub*.006));ctx.lineTo(bw,s*.24);
    ctx.lineTo(bw*.55,s*(.36+d*.02));ctx.lineTo(0,s*(.3+d*.03));
    ctx.lineTo(-bw*.55,s*(.36+d*.02));ctx.lineTo(-bw,s*.24);
    ctx.lineTo(-bw-s*(.14+d*.03),s*(.13+sub*.006));ctx.lineTo(-bw,s*.04);ctx.closePath();ctx.fill();
    if(d>=2){ctx.fillStyle='#fff';ctx.globalAlpha=.45;ctx.beginPath();ctx.arc(0,-s*(.52+d*.03),s*.03,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
    if(d>=4){ctx.fillStyle='#fff';ctx.globalAlpha=.2;
      ctx.beginPath();ctx.ellipse(-bw*.35,s*(.34+d*.02),s*.025,s*.07,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(bw*.35,s*(.34+d*.02),s*.025,s*.07,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
  }else{// HEAVY — 두꺼운 중장선
    const hw=s*(.28+d*.045);
    ctx.beginPath();ctx.moveTo(0,-s*(.44+d*.04));ctx.lineTo(hw*.55,-s*.24);ctx.lineTo(hw,-.04*s);
    ctx.lineTo(hw+s*(.04+d*.02),s*.16);ctx.lineTo(hw,s*.28);
    ctx.lineTo(hw*.45,s*(.36+d*.02));ctx.lineTo(0,s*(.32+d*.03));
    ctx.lineTo(-hw*.45,s*(.36+d*.02));ctx.lineTo(-hw,s*.28);
    ctx.lineTo(-hw-s*(.04+d*.02),s*.16);ctx.lineTo(-hw,-.04*s);ctx.lineTo(-hw*.55,-s*.24);ctx.closePath();ctx.fill();
    if(d>=1){ctx.globalAlpha=.35;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(-hw*.45,-.02*s);ctx.lineTo(hw*.45,-.02*s);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-hw*.5,s*.14);ctx.lineTo(hw*.5,s*.14);ctx.stroke();ctx.globalAlpha=1}
    if(d>=3){ctx.lineWidth=2;ctx.beginPath();ctx.arc(hw+s*.04,s*.06,s*.065,-Math.PI/2,Math.PI/2);ctx.stroke();
      ctx.beginPath();ctx.arc(-hw-s*.04,s*.06,s*.065,Math.PI/2,-Math.PI/2);ctx.stroke()}
    if(d>=4){ctx.globalAlpha=.3;ctx.fillRect(-hw*.75,s*(.34+d*.02),hw*1.5,s*.05);ctx.globalAlpha=1}
    if(d>=5){ctx.fillStyle='#fff';ctx.globalAlpha=.15;
      ctx.beginPath();ctx.arc(0,0,hw*.8,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
  }
  // cockpit
  ctx.fillStyle='#fff';ctx.globalAlpha=.3+sub*.03;
  ctx.beginPath();ctx.arc(0,type===1?-s*.08:-s*.12,s*(.045+d*.007),0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  if(d>=2){ctx.fillStyle='#fff';ctx.globalAlpha=.18+sub*.03;
    const ey=type===2?s*(.3+d*.03):s*(.24+d*.02);
    ctx.beginPath();ctx.ellipse(0,ey,s*.03,s*.07,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
  ctx.shadowBlur=0;ctx.restore();
}

    roundRect(cx,cry,cw,crh,4);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.save();ctx.translate(cx+cw/2,cry+crh*.2);drawCardIcon(c.type,RARITY_COLORS[c.rarity],crh*.12);ctx.restore();
    drawText(c.name,cx+cw/2,cry+crh*.45,RARITY_COLORS[c.rarity],Math.min(cw*.12,9));
    drawText(RARITY_NAMES[c.rarity],cx+cw/2,cry+crh*.62,'#666',Math.min(cw*.1,7));
    drawText(c.desc,cx+cw/2,cry+crh*.78,'#aaa',Math.min(cw*.1,7));
    if(owned)drawText('x'+game.cardInv[i],cx+cw-10,cry+8,'#fff',Math.min(cw*.12,9));
    ctx.globalAlpha=1;
  }
  const btnY=cy+ch*.82,bw1=Math.min(W*.22,150),bh1=Math.min(ch*.1,34);
  game._btns.pull1=drawBtn(W/2-bw1-8,btnY,bw1,bh1,'1회 뽑기 💎10','#1a1a0a','#fa0',game.gems>=10);
  game._btns.pull10=drawBtn(W/2+8,btnY,bw1,bh1,'10회 뽑기 💎90','#1a1a0a','#fa0',game.gems>=90);
}
function drawCardIcon(type,color,sz){
  ctx.fillStyle=color;const s=sz;
  if(type==='atk'){ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.6,s*.3);ctx.lineTo(-s*.6,s*.3);ctx.closePath();ctx.fill();ctx.fillRect(-1,-s*.3,2,s*1.3)}
  else if(type==='hp'){ctx.beginPath();ctx.moveTo(0,s*.6);ctx.bezierCurveTo(-s,0,-s,-s*.6,0,-s*.2);ctx.bezierCurveTo(s,-s*.6,s,0,0,s*.6);ctx.fill()}
  else{ctx.fillRect(-s*.6,-s*.2,s*1.2,s*.4);ctx.fillRect(-s*.2,-s*.6,s*.4,s*1.2)}
}
function tapSubCards(x,y){
  if(inBtn(game._btns.pull1,x,y)&&game.gems>=10){game.gems-=10;game.cardPullResult=pullCards(1,false);sfx(523,.15,'sine',.12);return}
  if(inBtn(game._btns.pull10,x,y)&&game.gems>=90){game.gems-=90;game.cardPullResult=pullCards(10,false);sfx(523,.15,'sine',.12);return}
}

// --- 카드 뽑기 결과 오버레이 ---
function renderCardPullOverlay(cy,ch){
  ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(0,0,W,H);
  drawText('카드 획득!',W/2,cy+ch*.06,'#fa0',Math.min(W*.04,22));
  const cards=game.cardPullResult,cols=Math.min(cards.length,5),rows=Math.ceil(cards.length/cols);
  const cw=Math.min(80,(W*.7)/cols),crh=Math.min(85,ch*.4/rows);
  const gw=cols*(cw+8)-8,gx=(W-gw)/2,gy=cy+ch*.14;
  for(let i=0;i<cards.length;i++){
    const c=cards[i],col=i%cols,row=Math.floor(i/cols);
    const cx=gx+col*(cw+8),cry=gy+row*(crh+8);
    ctx.fillStyle='#0a0a20';ctx.strokeStyle=RARITY_COLORS[c.rarity];ctx.lineWidth=2;
    ctx.shadowBlur=10;ctx.shadowColor=RARITY_COLORS[c.rarity];
    roundRect(cx,cry,cw,crh,6);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.save();ctx.translate(cx+cw/2,cry+crh*.2);drawCardIcon(c.type,RARITY_COLORS[c.rarity],crh*.12);ctx.restore();
    drawText(RARITY_NAMES[c.rarity],cx+cw/2,cry+crh*.42,RARITY_COLORS[c.rarity],8);
    drawText(c.name,cx+cw/2,cry+crh*.6,RARITY_COLORS[c.rarity],Math.min(cw*.13,10));
    drawText(c.desc,cx+cw/2,cry+crh*.8,'#ccc',Math.min(cw*.1,8));
  }
  const bw2=Math.min(W*.2,120);
  game._btns.pullOk=drawBtn(W/2-bw2/2,cy+ch*.82,bw2,32,'확인','#0a2a0a','#0ff');
}

// --- 카드 서브탭: 스킬 ---
function renderSubSkills(cy,ch){
  drawText('스킬 강화',W/2,cy+ch*.03,'#ff4444',Math.min(W*.035,18));
  const sc=SKILL_DEFS.length,rh=Math.min(ch*.18,50),gw=Math.min(W*.85,550);
  const gx=(W-gw)/2,gy=cy+ch*.1;
  game._btns.skillUp=[];
  const icons=['⚔','🛡','⚡','🏰'];
  for(let i=0;i<sc;i++){
    const s=SKILL_DEFS[i],lv=game.skillLv[i],maxed=lv>=s.maxLv;
    const ry=gy+i*(rh+6);
    ctx.fillStyle='#0a0a18';ctx.strokeStyle=maxed?'#555':s.color;ctx.lineWidth=maxed?1:1.5;
    roundRect(gx,ry,gw,rh,5);ctx.fill();ctx.stroke();
    drawText(icons[i],gx+rh/2,ry+rh/2,'#fff',Math.min(rh*.4,18));
    drawText(s.name,gx+rh+10,ry+rh*.3,s.color,Math.min(W*.02,12),'left');
    const pct=Math.round(s.perLv*lv*100);
    drawText(s.desc+' +'+pct+'%',gx+rh+10,ry+rh*.7,'#aaa',Math.min(W*.015,9),'left');
    drawText('Lv.'+lv+'/'+s.maxLv,gx+gw*.55,ry+rh/2,'#fff',Math.min(W*.018,11));
    if(!maxed){
      const cost=skillCost(i),can=game.coins>=cost;
      const bw=Math.min(gw*.22,100),bx=gx+gw-bw-8;
      game._btns.skillUp[i]=drawBtn(bx,ry+(rh-28)/2,bw,28,'💰'+cost,'#0a1a0a','#0f8',can);
    }else{drawText('MAX',gx+gw-40,ry+rh/2,'#fa0',11)}
  }
}
function tapSubSkills(x,y){
  if(!game._btns.skillUp)return;
  for(let i=0;i<SKILL_DEFS.length;i++){
    if(inBtn(game._btns.skillUp[i],x,y)&&game.skillLv[i]<SKILL_DEFS[i].maxLv){
      const cost=skillCost(i);
      if(game.coins>=cost){game.coins-=cost;game.skillLv[i]++;recalcStats();saveGame();sfx(523,.1,'sine',.1)}return}
  }
}

// --- 카드 서브탭: 룬 ---
function drawRuneHex(x,y,sz,color,rarity){
  ctx.save();ctx.translate(x,y);const s=sz;
  ctx.fillStyle=color;ctx.strokeStyle=color;ctx.lineWidth=1.5;
  ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i===0?ctx.moveTo(Math.cos(a)*s,Math.sin(a)*s):ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s)}ctx.closePath();
  ctx.globalAlpha=.25;ctx.fill();ctx.globalAlpha=1;ctx.stroke();
  if(rarity>=1){ctx.globalAlpha=.4;ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i===0?ctx.moveTo(Math.cos(a)*s*.5,Math.sin(a)*s*.5):ctx.lineTo(Math.cos(a)*s*.5,Math.sin(a)*s*.5)}ctx.closePath();ctx.fill();ctx.globalAlpha=1}
  if(rarity>=2){ctx.shadowBlur=6;ctx.shadowColor=color;ctx.beginPath();ctx.arc(0,0,s*.2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}
  ctx.restore();
}
function renderSubRunes(cy,ch){
  drawText('룬 장착',W/2,cy+ch*.03,'#ffcc00',Math.min(W*.035,18));
  // equipped slots
  const slotSz=Math.min(ch*.22,55),slotGap=12;
  const eqY=cy+ch*.1,eqGW=3*(slotSz+slotGap)-slotGap,eqX=(W-eqGW)/2;
  game._btns.runeSlots=[];
  drawText('장착 중',eqX-5,eqY+slotSz/2,'#888',9,'right');
  for(let i=0;i<3;i++){
    const sx=eqX+i*(slotSz+slotGap);
    ctx.fillStyle='#0a0a18';ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    roundRect(sx,eqY,slotSz,slotSz,5);ctx.fill();ctx.stroke();ctx.setLineDash([]);
    const rid=game.runeEquipped[i];
    if(rid!=null){const r=RUNE_DEFS[rid];
      ctx.strokeStyle=r.color;ctx.lineWidth=2;roundRect(sx,eqY,slotSz,slotSz,5);ctx.stroke();
      drawRuneHex(sx+slotSz/2,eqY+slotSz*.35,slotSz*.25,r.color,r.rarity);
      drawText(r.name,sx+slotSz/2,eqY+slotSz*.78,r.color,Math.min(slotSz*.16,8));
    }else{drawText('+',sx+slotSz/2,eqY+slotSz/2,'#333',18)}
    game._btns.runeSlots.push({x:sx,y:eqY,w:slotSz,h:slotSz});
  }
  // inventory
  const invY=eqY+slotSz+15;
  drawText('보유 룬',W/2,invY-5,'#888',9);
  const cols=Math.min(RUNE_DEFS.length,5),rw=Math.min((W*.8)/cols-6,80),rrh=Math.min(ch*.35,70);
  const igw=Math.min(cols*(rw+6)-6,W*.85),igx=(W-igw)/2;
  game._btns.runeItems=[];
  const rows2=Math.ceil(RUNE_DEFS.length/cols);
  for(let i=0;i<RUNE_DEFS.length;i++){
    const r=RUNE_DEFS[i],col=i%cols,row=Math.floor(i/cols);
    const rx=igx+col*(rw+6),ry=invY+5+row*(rrh+4),owned=game.runeInv[i]>0;
    ctx.globalAlpha=owned?1:.3;ctx.fillStyle='#0a0a18';ctx.strokeStyle=r.color;ctx.lineWidth=owned?1.5:1;
    roundRect(rx,ry,rw,rrh,4);ctx.fill();ctx.stroke();
    drawRuneHex(rx+rw/2,ry+rrh*.3,Math.min(rw*.18,12),r.color,r.rarity);
    drawText(r.name,rx+rw/2,ry+rrh*.6,r.color,Math.min(rw*.12,8));
    drawText(RARITY_NAMES[r.rarity],rx+rw/2,ry+rrh*.75,'#666',Math.min(rw*.1,7));
    if(owned)drawText('x'+game.runeInv[i],rx+rw-8,ry+6,'#fff',8);
    ctx.globalAlpha=1;
    if(owned)game._btns.runeItems.push({x:rx,y:ry,w:rw,h:rrh,id:i});
  }
}
function tapSubRunes(x,y){
  if(game._btns.runeSlots)for(let i=0;i<3;i++){
    if(inBtn(game._btns.runeSlots[i],x,y)&&game.runeEquipped[i]!=null){
      game.runeInv[game.runeEquipped[i]]++;game.runeEquipped[i]=null;
      recalcStats();saveGame();sfx(400,.08,'sine',.08);return}}
  if(game._btns.runeItems)for(const b of game._btns.runeItems){
    if(inBtn(b,x,y)&&game.runeInv[b.id]>0){
      const slot=game.runeEquipped.indexOf(null);
      if(slot>=0){game.runeInv[b.id]--;game.runeEquipped[slot]=b.id;recalcStats();saveGame();sfx(600,.08,'sine',.08)}return}}
}

// --- 카드 서브탭: 영웅(장비) ---
function drawPilot(x,y,s){
  ctx.save();ctx.translate(x,y);
  ctx.fillStyle='#1a3a5a';ctx.beginPath();ctx.arc(0,-22*s,13*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0ff';ctx.globalAlpha=.4;ctx.beginPath();ctx.arc(0,-22*s,9*s,-.3,Math.PI+.3,true);ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle='#2a4a6a';ctx.fillRect(-11*s,-9*s,22*s,24*s);
  ctx.fillRect(-17*s,-7*s,6*s,18*s);ctx.fillRect(11*s,-7*s,6*s,18*s);
  ctx.fillRect(-9*s,15*s,7*s,12*s);ctx.fillRect(2*s,15*s,7*s,12*s);
  ctx.fillStyle='#fa0';ctx.fillRect(-11*s,9*s,22*s,3*s);
  ctx.restore();
}
function drawEquipIcon(type,x,y,sz){
  ctx.save();ctx.translate(x,y);ctx.fillStyle='#556';ctx.strokeStyle='#556';const s=sz;
  switch(type){
    case'weapon':ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(0,s*.6);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.4,s*.15);ctx.lineTo(s*.4,s*.15);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.12,-s);ctx.lineTo(0,-s*1.15);ctx.lineTo(s*.12,-s);ctx.closePath();ctx.fill();break;
    case'helmet':ctx.beginPath();ctx.arc(0,-s*.05,s*.55,Math.PI,0);ctx.lineTo(s*.55,s*.3);ctx.lineTo(-s*.55,s*.3);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(0,255,255,.2)';ctx.fillRect(-s*.35,s*.05,s*.7,s*.15);break;
    case'armor':ctx.beginPath();ctx.moveTo(-s*.5,-s*.5);ctx.lineTo(s*.5,-s*.5);ctx.lineTo(s*.55,s*.5);ctx.lineTo(-s*.55,s*.5);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(-s*.12,-s*.35,s*.24,s*.45);break;
    case'shoes':ctx.fillRect(-s*.45,-s*.15,s*.3,s*.5);ctx.fillRect(s*.15,-s*.15,s*.3,s*.5);ctx.fillRect(-s*.45,s*.2,s*.45,s*.15);ctx.fillRect(s*.15,s*.2,s*.45,s*.15);break;
    case'necklace':ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,-s*.15,s*.35,0,Math.PI);ctx.stroke();ctx.beginPath();ctx.moveTo(0,s*.2);ctx.lineTo(-s*.18,s*.45);ctx.lineTo(s*.18,s*.45);ctx.closePath();ctx.fill();break;
    case'ring':ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,s*.05,s*.35,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(0,-s*.3,s*.12,0,Math.PI*2);ctx.fill();break;
  }
  ctx.restore();
}
function renderSubEquipment(cy,ch){
  drawText('영웅 장비',W/2,cy+ch*.03,'#0ff',Math.min(W*.035,18));
  const cx=W/2,my=cy+ch*.5;
  drawPilot(cx,my,Math.min(ch*.012,1));
  const slotSz=Math.min(ch*.2,48),gap=slotSz*.3;
  const positions=[
    {x:cx-slotSz*1.8,y:my-slotSz*1.1},{x:cx,y:my-slotSz*1.8},{x:cx+slotSz*1.8,y:my-slotSz*1.1},
    {x:cx-slotSz*1.8,y:my+slotSz*.5},{x:cx,y:my+slotSz*1.2},{x:cx+slotSz*1.8,y:my+slotSz*.5},
  ];
  for(let i=0;i<6;i++){
    const p=positions[i],eq=EQUIP_SLOTS[i];
    ctx.fillStyle='#0a0a18';ctx.strokeStyle='#334';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    roundRect(p.x-slotSz/2,p.y-slotSz/2,slotSz,slotSz,5);ctx.fill();ctx.stroke();ctx.setLineDash([]);
    if(game.equipment[i]){
      drawText('?',p.x,p.y,'#0ff',14);
    }else{
      drawEquipIcon(eq.id,p.x,p.y,slotSz*.25);
    }
    drawText(eq.name,p.x,p.y+slotSz/2+10,'#556',Math.min(slotSz*.2,9));
  }
}

// ================================================================
//  [TAB 4] 상점 — 프리미엄 (준비 중)
// ================================================================
function renderTabShop(cy,ch){
  const t=Date.now()*.001;
  ctx.save();ctx.shadowBlur=15;ctx.shadowColor='#0f8';
  drawText('PREMIUM SHOP',W/2,cy+ch*.3,'#0f8',Math.min(W*.05,28));
  ctx.shadowBlur=0;ctx.restore();
  drawText('프리미엄 상점 준비 중',W/2,cy+ch*.42,'#666',Math.min(W*.025,14));
  ctx.globalAlpha=.3+Math.sin(t*2)*.15;
  drawText('COMING SOON',W/2,cy+ch*.55,'#0f8',Math.min(W*.035,20));
  ctx.globalAlpha=1;
  drawText('특별한 아이템이 곧 추가됩니다',W/2,cy+ch*.68,'#444',Math.min(W*.02,11));
}

// ===== SAVE/LOAD =====
function saveGame(){try{localStorage.setItem('starConquest2',JSON.stringify({
  g:game.gems,co:game.coins,tl:game.timeline,hp:game.highestPlanet,
  ci:game.cardInv,dc:game.dungeonCD,sb:game.shopBought,snd:game.soundOn,
  sl:game.skillLv,ri:game.runeInv,re:game.runeEquipped,
  uu:game.upgUnits,ul:game.upgUnitLv,uf:game.upgFood,ub:game.upgBase,
  ut:game.upgTier,eq:game.equipment,tk:game.totalKills
}))}catch(e){}}
function loadGame(){try{const d=JSON.parse(localStorage.getItem('starConquest2'));if(d){
  game.gems=d.g||0;game.coins=d.co||0;game.timeline=d.tl||1;game.highestPlanet=d.hp||1;
  if(d.ci)game.cardInv=d.ci;
  if(d.dc)game.dungeonCD=d.dc;
  if(d.sb)game.shopBought=d.sb;
  if(d.snd!==undefined)game.soundOn=d.snd;
  if(d.sl)game.skillLv=d.sl;
  if(d.ri)game.runeInv=d.ri;
  if(d.re)game.runeEquipped=d.re;
  if(d.uu)game.upgUnits=d.uu;
  if(d.ul)game.upgUnitLv=d.ul;
  if(d.uf!==undefined)game.upgFood=d.uf;
  if(d.ub!==undefined)game.upgBase=d.ub;
  if(d.ut!==undefined)game.upgTier=d.ut;
  if(d.eq)game.equipment=d.eq;
  if(d.tk!==undefined)game.totalKills=d.tk;
  recalcStats();
}}catch(e){}}

// ===== INPUT =====
function getPos(e){
  const r=canvas.getBoundingClientRect(),sx=canvas.width/r.width,sy=canvas.height/r.height;
  const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-r.left)*sx,y:(cy-r.top)*sy}
}
function onTap(e){
  e.preventDefault();initAudio();const p=getPos(e);
  if(game.screen==='HOME')tapHome(p.x,p.y);
  else tapBattle(p.x,p.y);
}
canvas.addEventListener('touchstart',onTap,{passive:false});
canvas.addEventListener('mousedown',onTap);

// ===== MAIN LOOP =====
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  if(game.screen==='BATTLE'&&!game.showReset)updateBattle(dt);
  if(game.screen==='HOME'&&game.dungeonActive>=0)updateDungeon(dt);
  if(game.screen==='HOME')renderHome();
  else renderBattle();
  requestAnimationFrame(loop);
}

// ===== INIT =====
resize();loadGame();requestAnimationFrame(loop);
</script>
