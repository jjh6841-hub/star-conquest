let audioCtx;
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)}catch(e){}}
function sfx(freq,dur,type,vol){
  if(!audioCtx||!game.soundOn)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.12,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

// ===== DRAW UNIT =====
function drawUnit(u){
  const t=Date.now()*.001,hover=Math.sin(t*3+u.id*2)*2;
  ctx.save();
  ctx.translate(u.x,u.y+hover);
  if(u.isEnemy)ctx.scale(-1,1);
  ctx.shadowBlur=8;ctx.shadowColor=u.color;ctx.fillStyle=u.color;ctx.strokeStyle=u.color;ctx.lineWidth=2;
  if(u.state==='ATTACK'){ctx.globalAlpha=.6+Math.sin(t*15)*.4}
  if(u.state==='DIE'){ctx.globalAlpha=.3;ctx.scale(.8,.8)}
  const fn=SHAPES[u.shape];if(fn)fn(ctx,u.size,t);
  ctx.shadowBlur=0;ctx.restore();
  if(u.hp<u.maxHp&&u.state!=='DIE'){
    const bw=30*u.size;
    drawBar(u.x-bw/2,u.y-28*u.size+hover,bw,3,u.hp,u.maxHp,u.color);
  }
}

// ===== DRAW HELPERS =====
function drawBar(x,y,w,h,val,max,color){
  ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(x,y,w,h);
  ctx.fillStyle=color;ctx.fillRect(x,y,w*clamp(val/max,0,1),h);
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
}
function drawText(txt,x,y,color,sz,align){
  ctx.fillStyle=color||'#fff';ctx.font=(sz||16)+'px sans-serif';ctx.textAlign=align||'center';ctx.textBaseline='middle';ctx.fillText(txt,x,y);
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function drawBtn(x,y,w,h,txt,bg,fg,on){
  ctx.globalAlpha=on!==false?1:.4;ctx.fillStyle=bg||'#222';ctx.strokeStyle=fg||'#0ff';ctx.lineWidth=2;
  if(on!==false){ctx.shadowBlur=6;ctx.shadowColor=fg||'#0ff'}
  roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle=fg||'#0ff';ctx.font=Math.min(h*.4,18)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(txt,x+w/2,y+h/2);ctx.globalAlpha=1;
  return{x,y,w,h};
}

      ctx.fillRect(-s*.2,0,s*.4,s*.35);
      ctx.beginPath();ctx.arc(-s*.4,-s*.15,s*.13,0,Math.PI*2);ctx.fill();
      ctx.fillRect(-s*.53,0,s*.26,s*.25);
      ctx.beginPath();ctx.arc(s*.4,-s*.15,s*.13,0,Math.PI*2);ctx.fill();
      ctx.fillRect(s*.27,0,s*.26,s*.25);
      break;
    case'upgrade':
      ctx.beginPath();ctx.moveTo(0,-s*.5);ctx.lineTo(s*.3,-s*.1);ctx.lineTo(s*.15,-s*.1);
      ctx.lineTo(s*.15,s*.4);ctx.lineTo(-s*.15,s*.4);ctx.lineTo(-s*.15,-s*.1);ctx.lineTo(-s*.3,-s*.1);
      ctx.closePath();ctx.fill();
      break;
    case'shop':
      ctx.beginPath();ctx.moveTo(0,-s*.5);ctx.lineTo(s*.4,0);ctx.lineTo(0,s*.5);ctx.lineTo(-s*.4,0);ctx.closePath();ctx.fill();
      ctx.fillStyle='#000';ctx.globalAlpha=.3;
      ctx.beginPath();ctx.moveTo(0,-s*.2);ctx.lineTo(s*.15,0);ctx.lineTo(0,s*.2);ctx.lineTo(-s*.15,0);ctx.closePath();ctx.fill();
      ctx.globalAlpha=1;

        ctx.fillRect(-s*.06+Math.cos(a)*s*.35,-s*.06+Math.sin(a)*s*.35,s*.12,s*.12);

}

// ===== BATTLE LOGIC =====
function mkUnit(def,isEnemy,x){
  const gy=H*.72,by=def.isAir?gy-65:gy-15;
  return{id:uid++,x,y:by-(def.size||1)*10+rand(-3,3),isEnemy,
    typeId:def.id,shape:def.shape||def.id,name:def.name,
    hp:isEnemy?def.hp:unitStat(def,'hp'),maxHp:isEnemy?def.hp:unitStat(def,'hp'),
    dmg:isEnemy?def.dmg:unitStat(def,'dmg'),spd:isEnemy?def.spd:unitStat(def,'spd'),
    range:def.range,atkSpd:def.atkSpd,color:def.color,size:def.size||1,
    isAir:def.isAir||false,state:'MOVE',atkT:0,dieT:0};
}
function spawnP(i){
  if(i>=UNIT_TYPES.length)return;const t=UNIT_TYPES[i];
  if(game.energy<t.cost||game.pUnits.length>=30)return;
  game.energy-=t.cost;game.pUnits.push(mkUnit(t,false,W*.13));sfx(800,.08,'square',.1);
}
function spawnE(){
  const pl=PLANETS[game.currentPlanet];
  const avail=pl.enemies.filter((_,i)=>i===0||i===1&&game.bTime>10||i===2&&game.bTime>25);
  let tw=0;for(const e of avail)tw+=e.w;
  let r=rand(0,tw),sel=avail[0];
  for(const e of avail){r-=e.w;if(r<=0){sel=e;break}}
  if(game.eUnits.length<30)game.eUnits.push(mkUnit(sel,true,W*.87));
}
function updateBattle(dt){
  game.bTime+=dt;
  const maxE=game.maxEnergy*upgMult('energy_max'),regE=game.energyRegen*upgMult('energy_regen');
  game.energy=Math.min(maxE,game.energy+regE*dt);
  const pl=PLANETS[game.currentPlanet],si=Math.max(.8,pl.spawnInt-game.bTime*.015);
  game.espTimer-=dt;if(game.espTimer<=0){spawnE();game.espTimer=si}
  updUnits(game.pUnits,game.eUnits,1,dt);
  updUnits(game.eUnits,game.pUnits,-1,dt);
  const ebx=W*.88,pbx=W*.12;
  for(const u of game.pUnits){
    if(u.state==='DIE')continue;
    if(u.x>=ebx-u.range&&!hasTarget(u,game.eUnits)){
      u.state='ATTACK';u.atkT-=dt;
      if(u.atkT<=0){game.eBaseHP-=u.dmg;u.atkT=1/u.atkSpd;addProj(u.x,u.y,ebx,H*.72-40,u.color);game.shake=3;sfx(300,.1,'sawtooth',.06)}
    }
  }
  for(const u of game.eUnits){
    if(u.state==='DIE')continue;
    if(u.x<=pbx+u.range&&!hasTarget(u,game.pUnits)){
      u.state='ATTACK';u.atkT-=dt;
      if(u.atkT<=0){game.pBaseHP-=u.dmg;u.atkT=1/u.atkSpd;addProj(u.x,u.y,pbx,H*.72-40,u.color);game.shake=4;sfx(150,.15,'sawtooth',.08)}
    }
  }
  for(const p of game.projs){p.life-=dt;const pr=1-p.life/p.ml;p.cx=lerp(p.x,p.tx,pr);p.cy=lerp(p.y,p.ty,pr)}
  game.projs=game.projs.filter(p=>p.life>0);
  for(const p of game.parts){p.x+=p.vx*60*dt;p.y+=p.vy*60*dt;p.life-=dt}
  game.parts=game.parts.filter(p=>p.life>0);
  if(game.shake>0){game.shake*=.9;if(game.shake<.3)game.shake=0}
  game.pUnits=game.pUnits.filter(u=>u.state!=='DEAD');
  game.eUnits=game.eUnits.filter(u=>u.state!=='DEAD');
  if(game.eBaseHP<=0){
    game.result='WIN';game.screen='RESULT';
    const first=!game.completed.includes(game.currentPlanet);
    let reward=first?pl.reward:Math.floor(pl.reward*.3);
    if(game.boostReward){reward*=2;game.boostReward=false}
    game.resources+=reward;game._lastReward=reward;
    if(first){game.completed.push(game.currentPlanet);game.unlockedPlanets=Math.max(game.unlockedPlanets,game.currentPlanet+2)}
    saveGame();sfx(523,.15,'sine',.15);setTimeout(()=>sfx(659,.15,'sine',.15),150);setTimeout(()=>sfx(784,.3,'sine',.15),300);
  }
  if(game.pBaseHP<=0){game.result='LOSE';game.screen='RESULT';sfx(200,.3,'sawtooth',.1);setTimeout(()=>sfx(150,.4,'sawtooth',.1),300)}
}
function hasTarget(u,enemies){
  for(const e of enemies)if(e.state!=='DIE'&&Math.abs(u.x-e.x)<=u.range)return true;
  return false;
}
function updUnits(units,enemies,dir,dt){
  for(const u of units){
    if(u.state==='DIE'){u.dieT-=dt;if(u.dieT<=0)u.state='DEAD';continue}
    let nearest=null,nd=Infinity;
    for(const e of enemies){if(e.state==='DIE')continue;const d=Math.abs(u.x-e.x);if(d<nd){nd=d;nearest=e}}
    if(nearest&&nd<=u.range){
      u.state='ATTACK';u.atkT-=dt;
      if(u.atkT<=0){
        nearest.hp-=u.dmg;u.atkT=1/u.atkSpd;
        if(u.range>50)addProj(u.x,u.y,nearest.x,nearest.y,u.color);
        else addPart((u.x+nearest.x)/2,(u.y+nearest.y)/2,rand(-1,1),rand(-1,1),'#fff',.15,4);
        sfx(400+rand(-50,50),.05,'square',.04);
        if(nearest.hp<=0){nearest.state='DIE';nearest.dieT=.3;explode(nearest.x,nearest.y,nearest.color,10)}
      }
    }else{
      u.state='MOVE';u.x+=u.spd*dir*60*dt;u.atkT=0;
      if(Math.random()<.2)addPart(u.x-dir*10,u.y,rand(-dir*.5,-dir*.2),rand(-.3,.3),u.color,.2,rand(1,2));
    }
  }
}

function renderTabConquest(cy,ch){
  const pw=Math.min(W*.14,120),ph=ch*.75,gap=10;

  const sx=Math.max(10,(W-totalW)/2),py=cy+ch*.05;
  game._btns.planets=[];
  for(let i=0;i<PLANETS.length;i++){
    const px=sx+i*(pw+gap),ok=i<game.unlockedPlanets,done=game.completed.includes(i),p=PLANETS[i];
    const sel=game.selectedPlanet===i&&ok;
    ctx.globalAlpha=ok?1:.3;ctx.fillStyle=sel?'#0a1a1a':'#0a0a0a';
    ctx.strokeStyle=sel?'#0ff':(done?'#0f8':(ok?p.surface:'#222'));ctx.lineWidth=sel?3:1.5;
    if(sel||done){ctx.shadowBlur=8;ctx.shadowColor=ctx.strokeStyle}

    // planet circle
    const circY=py+ph*.28;
    ctx.fillStyle=p.surface;ctx.globalAlpha=ok?.2:.08;
    ctx.beginPath();ctx.arc(px+pw/2,circY,pw*.2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=ok?1:.3;ctx.strokeStyle=p.surface;ctx.lineWidth=1.5;ctx.stroke();
    // ring

    // bar for numeric stats
    if(typeof s.base==='number'&&i<4){
      const maxVal=[200,50,4,160][i];
      const barW2=cw2*.35;
      drawBar(ix+cw2*.58,ssy-4,barW2,8,typeof s.val==='string'?parseFloat(s.val):s.val,maxVal,s.color);
    }
  }
  // type badge
  if(u.isAir){
    drawText('공중 유닛',cx2+cw2-50,cy2+20,'#f0f',10);
  }
}
function tapTabArmy(x,y){
  if(game._btns.armyUnits)for(const b of game._btns.armyUnits)if(inBtn(b,x,y)){game.selectedUnit=b.i;sfx(600,.04,'sine',.08);return}
}

// --- TAB 2: UPGRADE ---
function renderTabUpgrade(cy,ch){
  const keys=Object.keys(UPGRADES),cols=3,rows=2;
  const cw=Math.min((W-40-(cols-1)*10)/cols,220),cr=Math.min((ch-20)/rows-8,ch*.45);
  const tw2=cols*cw+(cols-1)*10,sx=(W-tw2)/2,sy=cy+10;
  game._btns.upgs=[];
  for(let i=0;i<keys.length;i++){
    const k=keys[i],u=UPGRADES[k],lv=game.upg[k],cost=upgCost(k),ok=game.resources>=cost&&lv<u.max,mx=lv>=u.max;
    const col=i%cols,row=Math.floor(i/cols),cx2=sx+col*(cw+10),cy2=sy+row*(cr+10);
    ctx.fillStyle='#0a0a10';ctx.strokeStyle=ok?'#fc0':(mx?'#0f8':'#1a1a1a');ctx.lineWidth=ok?2:1;
    if(ok){ctx.shadowBlur=4;ctx.shadowColor='#fc0'}
    roundRect(cx2,cy2,cw,cr,8);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    drawText(u.name,cx2+cw/2,cy2+cr*.18,'#fff',Math.min(cw*.07,14));
    // level dots
    const dotY=cy2+cr*.38,dotR=Math.min(cw*.025,4),dotGap=dotR*2.8;
    const dotsW=u.max*dotGap;
    for(let j=0;j<u.max;j++){
      const dx=cx2+cw/2-dotsW/2+j*dotGap+dotR;
      ctx.fillStyle=j<lv?'#fc0':'#222';
      ctx.beginPath();ctx.arc(dx,dotY,dotR,0,Math.PI*2);ctx.fill();
    }
    // effect
    const cm=Math.floor((1+lv*u.m)*100);
    if(!mx){
      const nm=Math.floor((1+(lv+1)*u.m)*100);
      drawText(cm+'% → '+nm+'%',cx2+cw/2,cy2+cr*.58,'#8f8',Math.min(cw*.055,11));
      drawText('💎 '+cost,cx2+cw/2,cy2+cr*.78,ok?'#fc0':'#555',Math.min(cw*.06,13));
    }else{
      drawText(cm+'%  MAX',cx2+cw/2,cy2+cr*.58,'#fc0',Math.min(cw*.055,11));
      drawText('완료',cx2+cw/2,cy2+cr*.78,'#0f8',Math.min(cw*.06,12));
    }
    if(ok)game._btns.upgs.push({x:cx2,y:cy2,w:cw,h:cr,k});
  }
}
function tapTabUpgrade(x,y){
  if(game._btns.upgs)for(const b of game._btns.upgs)if(inBtn(b,x,y)){
    const cost=upgCost(b.k);
    if(game.resources>=cost){game.resources-=cost;game.upg[b.k]++;saveGame();sfx(600,.1,'sine',.1)}return;
  }
}

// --- TAB 3: SHOP ---
function renderTabShop(cy,ch){
  const items=[];
  // daily reward
  const claimed=game.dailyClaimed===todayKey();
  items.push({id:'daily',name:'일일 보급',desc:'매일 무료 자원 획득',reward:'💎 50',color:'#0ff',ok:!claimed,tag:claimed?'수령 완료':'무료'});
  // ad reward
  const adOk=game.adCooldown<=0;
  items.push({id:'ad',name:'보급 요청',desc:'긴급 자원 보급 (30초 대기)',reward:'💎 30',color:'#0f8',ok:adOk,tag:adOk?'무료':Math.ceil(game.adCooldown)+'초'});
  // starter pack
  items.push({id:'starter',name:'신병 보급팩',desc:'1회 한정 대량 자원',reward:'💎 200',color:'#f0f',ok:!game.starterClaimed,tag:game.starterClaimed?'수령 완료':'무료'});
  // boost reward
  items.push({id:'boost_r',name:'보상 2배 부스터',desc:'다음 전투 보상 2배',reward:'사용',color:'#fa0',ok:game.resources>=100&&!game.boostReward,cost:100,tag:game.boostReward?'적용중':'💎 100'});
  // boost energy
  items.push({id:'boost_e',name:'에너지 MAX 충전',desc:'다음 전투 에너지 가득',reward:'사용',color:'#fc0',ok:game.resources>=80&&!game.boostEnergy,cost:80,tag:game.boostEnergy?'적용중':'💎 80'});

  const iw=Math.min((W-40)/items.length-8,180),ih=ch-20,gap=8;
  const tw2=items.length*iw+(items.length-1)*gap,sx=(W-tw2)/2,sy=cy+10;
  game._btns.shop=[];
  for(let i=0;i<items.length;i++){
    const it=items[i],ix=sx+i*(iw+gap);
    ctx.fillStyle='#0a0a10';ctx.strokeStyle=it.ok?it.color:'#1a1a1a';ctx.lineWidth=it.ok?2:1;
    if(it.ok){ctx.shadowBlur=4;ctx.shadowColor=it.color}
    roundRect(ix,sy,iw,ih,8);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    // tag badge
    const tagCol=it.tag==='무료'?'#0f8':(it.ok?it.color:'#555');
    ctx.fillStyle=tagCol;ctx.globalAlpha=.15;
    roundRect(ix+iw*.15,sy+8,iw*.7,18,4);ctx.fill();
    ctx.globalAlpha=1;
    drawText(it.tag,ix+iw/2,sy+17,tagCol,Math.min(iw*.08,10));
    // icon area
    const iconY=sy+ih*.35;
    ctx.fillStyle=it.color;ctx.globalAlpha=.15;
    ctx.beginPath();ctx.arc(ix+iw/2,iconY,iw*.18,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    drawTabIcon('shop',ix+iw/2,iconY,iw*.25,it.color);
    // name
    drawText(it.name,ix+iw/2,sy+ih*.55,it.ok?'#fff':'#666',Math.min(iw*.08,12));
    // desc
    drawText(it.desc,ix+iw/2,sy+ih*.67,it.ok?'#888':'#444',Math.min(iw*.06,8));
    // reward
    drawText(it.reward,ix+iw/2,sy+ih*.8,it.ok?it.color:'#444',Math.min(iw*.08,13));
    if(it.ok)game._btns.shop.push({x:ix,y:sy,w:iw,h:ih,id:it.id});
  }
}
function tapTabShop(x,y){
  if(!game._btns.shop)return;
  for(const b of game._btns.shop){
    if(!inBtn(b,x,y))continue;
    switch(b.id){
      case'daily':game.resources+=50;game.dailyClaimed=todayKey();break;
      case'ad':game.resources+=30;game.adCooldown=30;break;
      case'starter':game.resources+=200;game.starterClaimed=true;break;
      case'boost_r':if(game.resources>=100){game.resources-=100;game.boostReward=true}break;
      case'boost_e':if(game.resources>=80){game.resources-=80;game.boostEnergy=true}break;
    }
    saveGame();sfx(800,.1,'sine',.12);return;
  }
}

// --- TAB 4: SETTINGS ---
function renderTabSettings(cy,ch){
  const cx2=W/2,midY=cy+ch/2;
  game._btns.settings={};
  // sound toggle
  const sw=Math.min(W*.25,200),sh=42;
  game._btns.settings.sound=drawBtn(cx2-sw/2,midY-sh*1.8,sw,sh,
    '사운드: '+(game.soundOn?'ON':'OFF'),'#0a0a10',game.soundOn?'#0ff':'#555');
  // reset
  game._btns.settings.reset=drawBtn(cx2-sw/2,midY-sh*.3,sw,sh,
    '진행 초기화','#1a0a0a','#f44');
  // info
  drawText('STAR CONQUEST v1.1',cx2,midY+sh*1.2,'#333',12);
  drawText('Canvas + JavaScript',cx2,midY+sh*1.2+18,'#222',10);
}
function tapTabSettings(x,y){
  if(!game._btns.settings)return;
  if(inBtn(game._btns.settings.sound,x,y)){game.soundOn=!game.soundOn;saveGame();return}
  if(inBtn(game._btns.settings.reset,x,y)){
    if(confirm('모든 진행 상황을 초기화하시겠습니까?')){
      localStorage.removeItem('starConquest');
      game.resources=0;game.unlockedPlanets=1;game.completed=[];
      game.dailyClaimed=0;game.starterClaimed=false;game.boostReward=false;game.boostEnergy=false;
      for(let k in UPGRADES)game.upg[k]=0;
      game.selectedPlanet=0;
    }
  }
}

// --- LOBBY TAP ---
function tapLobby(x,y){
  // tabs first
  if(game._btns.tabs)for(const b of game._btns.tabs)if(inBtn(b,x,y)){
    if(game.lobbyTab!==b.i){game.lobbyTab=b.i;sfx(800,.04,'sine',.08)}return;
  }
  // tab content
  switch(game.lobbyTab){
    case 0:tapTabConquest(x,y);break;
    case 1:tapTabArmy(x,y);break;
    case 2:tapTabUpgrade(x,y);break;
    case 3:tapTabShop(x,y);break;
    case 4:tapTabSettings(x,y);break;
  }
}

// --- BATTLE ---
function startBattle(pi){
  game.currentPlanet=pi;game.screen='BATTLE';game.pUnits=[];game.eUnits=[];game.projs=[];game.parts=[];
  game.bTime=0;game.espTimer=2;game.result=null;game.shake=0;
  const pl=PLANETS[pi];game.eBaseHP=pl.baseHP;game.eBaseMax=pl.baseHP;
  game.pBaseMax=500*upgMult('base_hp');game.pBaseHP=game.pBaseMax;
  game.maxEnergy=100*upgMult('energy_max');
  game.energy=game.boostEnergy?game.maxEnergy:game.maxEnergy*.5;
  game.boostEnergy=false;saveGame();
}
function renderBattle(){
  const pl=PLANETS[game.currentPlanet];
  ctx.save();
  if(game.shake>0)ctx.translate(rand(-game.shake,game.shake),rand(-game.shake,game.shake));
  drawBg(pl);drawPBase();drawEBase();
  const all=[...game.pUnits,...game.eUnits].sort((a,b)=>a.y-b.y);
  for(const u of all)if(u.state!=='DEAD')drawUnit(u);
  for(const p of game.projs){
    ctx.save();ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.shadowBlur=6;ctx.shadowColor=p.color;
    ctx.globalAlpha=p.life/p.ml;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.cx,p.cy);ctx.stroke();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.cx,p.cy,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
  for(const p of game.parts){
    ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(p.life/p.ml),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.restore();
  // HUD
  drawText(pl.name+' - '+pl.sub,W/2,H*.04,pl.surface,13);
  const maxE=game.maxEnergy*upgMult('energy_max');
  drawBar(15,H*.02,W*.18,14,game.energy,maxE,'#fc0','rgba(255,200,0,.1)');
  drawText('⚡'+Math.floor(game.energy)+'/'+Math.floor(maxE),15+W*.09,H*.02+7,'#fc0',10);
  const m=Math.floor(game.bTime/60),s=Math.floor(game.bTime%60);
  drawText(m+':'+(s<10?'0':'')+s,W-50,H*.04,'#555',11);
  // bottom panel
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,H*.84,W,H*.16);
  // unit buttons
  const bc=UNIT_TYPES.length,bw=Math.min((W-60)/bc-8,110),bh=H*.13,bgap=8;
  const tw=bc*bw+(bc-1)*bgap,bsx=(W-tw)/2,bsy=H-bh-6;
  game._btns.units=[];
  for(let i=0;i<bc;i++){
    const t=UNIT_TYPES[i],bx=bsx+i*(bw+bgap),ok=game.energy>=t.cost;
    ctx.globalAlpha=ok?1:.45;ctx.fillStyle=ok?'#0a1515':'#0a0a0a';ctx.strokeStyle=ok?t.color:'#333';ctx.lineWidth=ok?2:1;
    if(ok){ctx.shadowBlur=5;ctx.shadowColor=t.color}
    roundRect(bx,bsy,bw,bh,6);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.save();ctx.translate(bx+bw/2,bsy+bh*.3);
    ctx.fillStyle=t.color;ctx.strokeStyle=t.color;ctx.lineWidth=1.5;
    const fn=SHAPES[t.shape];if(fn)fn(ctx,.35,Date.now()*.001);
    ctx.restore();
    drawText(t.name,bx+bw/2,bsy+bh*.62,t.color,Math.min(bw*.11,10));
    drawText('⚡'+t.cost,bx+bw/2,bsy+bh*.82,ok?'#fc0':'#555',Math.min(bw*.12,12));
    ctx.globalAlpha=1;
    game._btns.units.push({x:bx,y:bsy,w:bw,h:bh,i});
  }
}
function tapBattle(x,y){
  if(game._btns.units)for(const b of game._btns.units)if(inBtn(b,x,y)){spawnP(b.i);return}
}

// --- RESULT ---
function renderResult(){
  drawBg(null);
  const win=game.result==='WIN',col=win?'#0f8':'#f44',txt=win?'행성 정복 완료!':'기지가 파괴되었습니다';
  ctx.save();ctx.shadowBlur=20;ctx.shadowColor=col;ctx.fillStyle=col;
  ctx.font='bold '+Math.min(W*.06,40)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(txt,W/2,H*.28);ctx.shadowBlur=0;ctx.restore();
  if(win){
    drawText('획득 자원: 💎 '+(game._lastReward||0),W/2,H*.44,'#fc0',18);
    drawText('총 자원: 💎 '+game.resources,W/2,H*.52,'#a80',14);
  }
  const bw=Math.min(W*.22,170),bh=42,g=15;
  game._btns.rnext=null;game._btns.rretry=null;
  if(win&&game.currentPlanet+1<PLANETS.length){
    game._btns.rnext=drawBtn(W/2-bw-g/2,H*.63,bw,bh,'다음 행성 ▶','#0a2a0a','#0f8');
  }else if(!win){
    game._btns.rretry=drawBtn(W/2-bw-g/2,H*.63,bw,bh,'다시 도전','#2a1a0a','#fa0');
  }
  game._btns.rlobby=drawBtn(win&&game.currentPlanet+1<PLANETS.length?W/2+g/2:W/2-bw/2+(win?bw+g:0),H*.63,bw,bh,'기지로 복귀','#0a1a2a','#0af');
  if(!win)game._btns.rlobby=drawBtn(W/2+g/2,H*.63,bw,bh,'기지로 복귀','#0a1a2a','#0af');
}
function tapResult(x,y){
  if(inBtn(game._btns.rnext,x,y)){startBattle(game.currentPlanet+1);sfx(1000,.05,'sine',.1);return}
  if(inBtn(game._btns.rretry,x,y)){startBattle(game.currentPlanet);sfx(1000,.05,'sine',.1);return}
  if(inBtn(game._btns.rlobby,x,y)){game.screen='LOBBY';game.lobbyTab=0;sfx(800,.05,'sine',.08)}
}

// ===== SAVE/LOAD =====
function saveGame(){try{localStorage.setItem('starConquest',JSON.stringify({
  r:game.resources,u:game.unlockedPlanets,c:game.completed,up:game.upg,
  dc:game.dailyClaimed,sc:game.starterClaimed,br:game.boostReward,be:game.boostEnergy,snd:game.soundOn
}))}catch(e){}}
function loadGame(){try{const d=JSON.parse(localStorage.getItem('starConquest'));if(d){
  game.resources=d.r||0;game.unlockedPlanets=d.u||1;game.completed=d.c||[];game.upg=d.up||{};
  game.dailyClaimed=d.dc||0;game.starterClaimed=d.sc||false;game.boostReward=d.br||false;game.boostEnergy=d.be||false;
  if(d.snd!==undefined)game.soundOn=d.snd;
  for(let k in UPGRADES)if(!(k in game.upg))game.upg[k]=0;
}}catch(e){}}

// ===== INPUT =====
function getPos(e){
  const r=canvas.getBoundingClientRect(),sx=canvas.width/r.width,sy=canvas.height/r.height;
  const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-r.left)*sx,y:(cy-r.top)*sy};
}
function onTap(e){
  e.preventDefault();initAudio();
  const p=getPos(e);
  switch(game.screen){
    case'MENU':tapMenu(p.x,p.y);break;
    case'LOBBY':tapLobby(p.x,p.y);break;
    case'BATTLE':tapBattle(p.x,p.y);break;
    case'RESULT':tapResult(p.x,p.y);break;
  }
}
canvas.addEventListener('touchstart',onTap,{passive:false});
canvas.addEventListener('mousedown',onTap);

// ===== MAIN LOOP =====
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  // ad cooldown
  if(game.adCooldown>0)game.adCooldown-=dt;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  if(game.screen==='BATTLE')updateBattle(dt);
  switch(game.screen){
    case'MENU':renderMenu();break;
    case'LOBBY':renderLobby();break;
    case'BATTLE':renderBattle();break;
    case'RESULT':renderResult();break;
  }
  requestAnimationFrame(loop);
}

// ===== INIT =====
resize();loadGame();requestAnimationFrame(loop);
</script>
</body>
